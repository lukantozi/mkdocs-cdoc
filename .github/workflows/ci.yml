name: CI Pipeline - Week 7-8

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-validate:
    name: Test and Validate Plugin
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov flake8 pylint mypy

      - name: Run flake8
        run: |
          flake8 mkdocs_cdoc/

      - name: Run pylint
        run: |
          pylint mkdocs_cdoc/ --fail-under=9.0 --disable=C0114,C0115,C0116

      - name: Run pytest test suite
        run: |
          pytest tests/ -v

      - name: Generate code coverage report
        run: |
          pytest --cov=mkdocs_cdoc --cov-report=term-missing tests/

      - name: Validate mkdocs build on example project
        run: |
          cd example
          mkdocs build
